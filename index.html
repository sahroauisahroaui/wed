<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة تعريف - صحراوي شيماء</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="id-card">
            <div class="card-header">
                <div class="profile-img-container">
                    <img src="your-photo.jpg" alt="صحراوي شيماء" class="profile-img">
                </div>
                <h2>صحراوي شيماء</h2>
                <p class="tagline">طالبة في كلية الإعلام الآلي</p>
            </div>

            <div class="card-body">
                <div class="info-row">
                    <span class="label">الاسم الكامل:</span>
                    <span class="value">صحراوي شيماء (Sahraoui Chaima)</span>
                </div>
                <div class="info-row">
                    <span class="label">العمر:</span>
                    <span class="value" id="age-display">جاري الحساب...</span>
                </div>
                <div class="info-row">
                    <span class="label">الجامعة:</span>
                    <span class="value">جامعة الشهيد حمة لخضر - الوادي</span>
                </div>
                <div class="info-row">
                    <span class="label">المستوى:</span>
                    <span class="value">سنة ثانية (L2 Informatique)</span>
                </div>
            </div>

            <div class="card-footer">
                <p>مختبر تطوير تطبيقات الويب 2026</p>
            </div>
        </div>
    </div>

    <script>
        function updateAge() {
            const birth = new Date('2006-03-28'); // تاريخ ميلادك
            const now = new Date(); 
            let years = now.getFullYear() - birth.getFullYear();
            const monthDiff = now.getMonth() - birth.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < birth.getDate())) {
                years--;
            }
            document.getElementById('age-display').innerText = years + " سنة";
        }
        window.onload = updateAge;
    </script>
</body>
</html>
